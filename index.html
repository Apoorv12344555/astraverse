<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  text-align:center;
}

/* LOGO */
.logo{
  font-family:'Orbitron';
  color:#00f7ff;
  font-size:2rem;
  margin:20px;
  text-shadow:0 0 15px #00f7ff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00f7ff;
}

/* BUTTON */
.btn{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f7ff,#a855f7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:active{
  transform:scale(0.9);
}

/* GAME */
.game{display:none}
.active{display:block}

/* CANVAS */
canvas{
  background:#000;
  border:2px solid #00f7ff;
  margin-top:20px;
}

/* MOBILE */
@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
  button{
    width:90%;
  }
}
</style>
</head>

<body>

<div class="logo"> AstraVerse Pro</div>

<!-- USER -->
<div>
<input id="username" placeholder="Enter your name">
<button class="btn" onclick="saveUser()">Save</button>
<p id="welcome"></p>
</div>

<h2>Choose Game</h2>

<div class="grid">
<div class="card"><button class="btn" onclick="showGame('clickGame')">🎯 Click Game</button></div>
<div class="card"><button class="btn" onclick="showGame('memoryGame')">🧠 Memory Game</button></div>
<div class="card"><button class="btn" onclick="showGame('ticGame')">⭕ Tic Tac Toe</button></div>
<div class="card"><button class="btn" onclick="showGame('guessGame')">🎲 Guess Number</button></div>
</div>

<!-- CLICK GAME -->
<div id="clickGame" class="game">
<h2>Click Game</h2>
<p id="clickScore">Score: 0</p>
<p id="clickBoard"></p>
<button class="btn" onclick="startClick()">Start</button>
<button id="target" onclick="hitTarget()" style="display:none">🎯</button>
</div>

<!-- MEMORY GAME -->
<div id="memoryGame" class="game">
<h2>Memory Game</h2>
<p id="memoryBoardScore"></p>
<button class="btn" onclick="startMemory()">Start</button>
<div id="memoryBoard"></div>
</div>

<!-- TIC TAC TOE -->
<div id="ticGame" class="game">
<h2>Tic Tac Toe</h2>
<p id="ticBoardScore"></p>
<div id="ticBoard"></div>
<button class="btn" onclick="startTic()">Start</button>
</div>

<!-- GUESS GAME -->
<div id="guessGame" class="game">
<h2>Guess Number</h2>
<p id="guessBoard"></p>
<input id="guessInput">
<button class="btn" onclick="checkGuess()">Guess</button>
<p id="guessResult"></p>
</div>

<script>

/* USER SYSTEM */
function saveUser(){
  let name=document.getElementById("username").value;
  localStorage.setItem("user",name);
  document.getElementById("welcome").innerText="Welcome "+name;
}

function getUser(){
  return localStorage.getItem("user")||"Player";
}

window.onload = ()=>{
  let name = localStorage.getItem("user");
  if(name){
    document.getElementById("welcome").innerText="Welcome "+name;
  }
}

/* GAME SWITCH */
function showGame(id){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LEADERBOARD */
function saveScore(game,score){
  let user=getUser();
  let data=JSON.parse(localStorage.getItem(game))||[];
  data.push({user,score});
  data.sort((a,b)=>b.score-a.score);
  data=data.slice(0,5);
  localStorage.setItem(game,JSON.stringify(data));
}

function showBoard(game,element){
  let data=JSON.parse(localStorage.getItem(game))||[];
  document.getElementById(element).innerText =
    data.map(d=>d.user+": "+d.score).join(" | ");
}

/* CLICK GAME */
let clickScore=0, running=false;

function startClick(){
  clickScore=0;
  running=true;
  document.getElementById("target").style.display="inline";
  move();
  showBoard("click","clickBoard");
}

function move(){
  if(!running) return;
  let t=document.getElementById("target");
  t.style.position="absolute";
  t.style.left=Math.random()*80+"%";
  t.style.top=Math.random()*80+"%";
  setTimeout(move,800);
}

function hitTarget(){
  if(running){
    clickScore++;
    document.getElementById("clickScore").innerText="Score: "+clickScore;

    if(clickScore>=10){
      running=false;
      saveScore("click",clickScore);
      showBoard("click","clickBoard");
      alert("Game Over");
    }
  }
}

/* MEMORY GAME */
let flipped=[],moves=0;

function startMemory(){
  moves=0;
  const emojis=["🔥","🔥","⚡","⚡","🎮","🎮","💎","💎"];
  let cards=emojis.sort(()=>0.5-Math.random());
  let board=document.getElementById("memoryBoard");
  board.innerHTML="";
  flipped=[];

  cards.forEach(e=>{
    let b=document.createElement("button");
    b.innerText="?";
    b.onclick=()=>flip(b,e);
    board.appendChild(b);
  });

  showBoard("memory","memoryBoardScore");
}

function flip(btn,e){
  if(flipped.length<2){
    btn.innerText=e;
    flipped.push({btn,e});
    moves++;

    if(flipped.length===2){
      if(flipped[0].e!==flipped[1].e){
        setTimeout(()=>{
          flipped[0].btn.innerText="?";
          flipped[1].btn.innerText="?";
          flipped=[];
        },800);
      }else flipped=[];
    }

    if(moves>=12){
      saveScore("memory",moves);
      showBoard("memory","memoryBoardScore");
      alert("Game Over Moves:"+moves);
    }
  }
}

/* TIC TAC TOE */
let turn="X";
let boardState=["","","","","","","","",""];

function startTic(){
  let board=document.getElementById("ticBoard");
  board.innerHTML="";
  turn="X";
  boardState=["","","","","","","","",""];

  for(let i=0;i<9;i++){
    let btn=document.createElement("button");
    btn.className="btn";
    btn.onclick=()=>playMove(btn,i);
    board.appendChild(btn);
  }

  showBoard("tic","ticBoardScore");
}

function playMove(btn,i){
  if(boardState[i]===""){
    boardState[i]=turn;
    btn.innerText=turn;

    if(checkWin()){
      alert(turn+" Wins!");
      saveScore("tic",10);
      showBoard("tic","ticBoardScore");
      return;
    }

    turn = (turn==="X") ? "O" : "X";
  }
}

function checkWin(){
  let wins=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return wins.some(w=>{
    return boardState[w[0]] &&
           boardState[w[0]]===boardState[w[1]] &&
           boardState[w[1]]===boardState[w[2]];
  });
}

/* GUESS GAME */
let number=Math.floor(Math.random()*10);

function checkGuess(){
  let g=document.getElementById("guessInput").value;

  if(g==number){
    document.getElementById("guessResult").innerText="Correct!";
    saveScore("guess",10);
    showBoard("guess","guessBoard");
    number=Math.floor(Math.random()*10);
  } else {
    document.getElementById("guessResult").innerText="Try Again";
  }
}

</script>

</body>
</html>
