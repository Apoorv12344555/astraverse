<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  text-align:center;
}

.logo{
  font-family:'Orbitron';
  color:#00f7ff;
  font-size:2rem;
  margin:20px;
  text-shadow:0 0 15px #00f7ff;
}

h1{
  text-shadow:0 0 10px #6cf;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 0 20px #00f7ff;
}

.btn{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f7ff,#a855f7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00f7ff;
}

.game{
  display:none;
  animation:fadeIn 0.5s ease;
}

.active{display:block}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

canvas{
  background:#000;
  border:2px solid #00f7ff;
  box-shadow:0 0 15px #00f7ff;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>

<div class="logo">⚡ AstraVerse Pro</div>
<h1>Choose a Game</h1>

<div class="grid">

<div class="card">
<h3>🎯 Click Target</h3>
<button class="btn" onclick="showGame('clickGame')">Play</button>
</div>

<div class="card">
<h3>🧠 Memory Game</h3>
<button class="btn" onclick="showGame('memoryGame')">Play</button>
</div>

<div class="card">
<h3>🧱 Brick Breaker</h3>
<button class="btn" onclick="showGame('brickGame')">Play</button>
</div>

<div class="card">
<h3>⚡ Reaction Game</h3>
<button class="btn" onclick="showGame('reactionGame')">Play</button>
</div>

</div>

<!-- CLICK GAME -->
<div id="clickGame" class="game">
<h2>Click Target</h2>
<p id="clickScore">Score: 0</p>
<button class="btn" onclick="startClick()">Start</button>
<br>
<button class="btn" id="target" onclick="hitTarget()" style="display:none">🎯</button>
</div>

<!-- MEMORY GAME -->
<div id="memoryGame" class="game">
<h2>Memory Game</h2>
<button class="btn" onclick="startMemory()">Start</button>
<div id="memoryBoard"></div>
</div>

<!-- BRICK GAME -->
<div id="brickGame" class="game">
<h2>Brick Breaker</h2>
<canvas id="brickCanvas" width="400" height="400"></canvas>
<p id="brickScore"></p>
<button class="btn" onclick="startBrick()">Start</button>
</div>

<!-- REACTION GAME -->
<div id="reactionGame" class="game">
<h2>Reaction Game</h2>
<p id="reactionText">Click Start</p>
<button class="btn" onclick="startReaction()">Start</button>
</div>

<script>

/* SOUND */
function playClick(){
  document.getElementById("clickSound").play();
}
function playGameOver(){
  document.getElementById("gameOverSound").play();
}

/* SWITCH */
function showGame(id){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* CLICK GAME */
let clickScore=0, clickRunning=false;

function startClick(){
  clickScore=0;
  clickRunning=true;
  document.getElementById("target").style.display="inline-block";
  moveTarget();
}

function moveTarget(){
  if(!clickRunning) return;
  let btn=document.getElementById("target");
  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*80+"%";
  setTimeout(moveTarget,800);
}

function hitTarget(){
  if(clickRunning){
    playClick();
    clickScore++;
    document.getElementById("clickScore").innerText="Score: "+clickScore;
  }
}

/* MEMORY GAME */
let cards=[], flipped=[];

function startMemory(){
  const emojis=["🔥","🔥","⚡","⚡","🎮","🎮","💎","💎"];
  cards=emojis.sort(()=>0.5-Math.random());
  flipped=[];
  let board=document.getElementById("memoryBoard");
  board.innerHTML="";

  cards.forEach((emoji)=>{
    let btn=document.createElement("button");
    btn.innerText="?";
    btn.className="btn";
    btn.onclick=()=>flipCard(btn,emoji);
    board.appendChild(btn);
  });
}

function flipCard(btn,emoji){
  if(flipped.length<2){
    playClick();
    btn.innerText=emoji;
    flipped.push({btn,emoji});

    if(flipped.length===2){
      if(flipped[0].emoji===flipped[1].emoji){
        flipped=[];
      }else{
        setTimeout(()=>{
          flipped[0].btn.innerText="?";
          flipped[1].btn.innerText="?";
          flipped=[];
        },800);
      }
    }
  }
}

/* BRICK GAME */
let paddle,ball,bricks,brickRunning,brickScore;

function startBrick(){
  paddle={x:160,width:80};
  ball={x:200,y:200,dx:3,dy:-3};
  bricks=[];
  brickScore=0;
  brickRunning=true;

  for(let i=0;i<5;i++){
    for(let j=0;j<3;j++){
      bricks.push({x:i*80+10,y:j*30+10});
    }
  }
}

document.addEventListener("mousemove", e=>{
  if(!brickRunning) return;
  paddle.x=e.clientX-50;
});

function updateBrick(){
  if(!brickRunning) return;

  ball.x+=ball.dx;
  ball.y+=ball.dy;

  if(ball.x<0||ball.x>400) ball.dx*=-1;
  if(ball.y<0) ball.dy*=-1;

  if(ball.y>380 && ball.x>paddle.x && ball.x<paddle.x+paddle.width){
    ball.dy*=-1;
  }

  bricks.forEach((b,i)=>{
    if(ball.x>b.x && ball.x<b.x+60 && ball.y>b.y && ball.y<b.y+20){
      bricks.splice(i,1);
      ball.dy*=-1;
      brickScore++;
    }
  });

  if(ball.y>400){
    brickRunning=false;
    playGameOver();
    document.getElementById("brickScore").innerText="Game Over: "+brickScore;
  }
}

function drawBrick(){
  let ctx=document.getElementById("brickCanvas").getContext("2d");
  ctx.clearRect(0,0,400,400);

  ctx.fillRect(paddle.x,380,paddle.width,10);
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();

  bricks.forEach(b=>ctx.fillRect(b.x,b.y,60,20));
}

function loopBrick(){
  updateBrick();
  drawBrick();
  requestAnimationFrame(loopBrick);
}
loopBrick();

/* REACTION GAME */
let reactionStart;

function startReaction(){
  document.getElementById("reactionText").innerText="Wait...";

  setTimeout(()=>{
    document.body.style.background="green";
    reactionStart=Date.now();

    document.body.onclick=()=>{
      playClick();
      let time=Date.now()-reactionStart;
      document.getElementById("reactionText").innerText="Time: "+time+" ms";
      document.body.style.background="#020617";
      document.body.onclick=null;
    };

  },Math.random()*3000+2000);
}

/* BUTTON EFFECT */
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    btn.style.transform='scale(0.9)';
    setTimeout(()=>btn.style.transform='scale(1)',100);
  });
});

</script>

</body>
</html>
