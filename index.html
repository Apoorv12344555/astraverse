<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron',sans-serif;background:#0a0a0f;color:white;text-align:center}

nav{display:flex;justify-content:space-between;padding:15px 30px;background:#0a0a0f}
.logo{color:#6cf;font-size:1.5rem}

.btn{padding:10px 20px;margin:10px;border:none;border-radius:20px;background:linear-gradient(90deg,#6cf,#a855f7);color:white;cursor:pointer}

canvas{background:#000;border:1px solid #6cf;border-radius:10px;margin-top:20px}

.game{display:none}
.active{display:block}
</style>
</head>

<body>

<nav>
<div class="logo">⚡ AstraVerse Pro</div>
</nav>

<h1>AstraVerse Pro</h1>

<button class="btn" onclick="showGame('dodge')">Play Neon Dodge</button>
<button class="btn" onclick="showGame('tap')">Play Tap Game</button>

<!-- DODGE GAME -->
<div id="dodge" class="game">
<h2>Neon Dodge</h2>
<canvas id="dodgeCanvas" width="400" height="500"></canvas>
<p id="dodgeScore"></p>
<button class="btn" onclick="startDodge()">Start</button>
</div>

<!-- TAP GAME -->
<div id="tap" class="game">
<h2>Tap Speed Game</h2>
<p id="tapScore">Score: 0</p>
<button class="btn" onclick="tap()">Tap Me!</button>
<button class="btn" onclick="startTap()">Start</button>
</div>

<script>

// SWITCH GAME
function showGame(id){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =======================
   🎮 DODGE GAME
======================= */

const canvas = document.getElementById("dodgeCanvas");
const ctx = canvas.getContext("2d");

let player, obstacles, running, score;

function resetDodge(){
  player = {x:180,y:450,size:20};
  obstacles = [];
  score = 0;
}

function startDodge(){
  resetDodge();
  running = true;
}

document.addEventListener("keydown", e=>{
  if(!running) return;
  if(e.key==="ArrowLeft" && player.x>0) player.x-=15;
  if(e.key==="ArrowRight" && player.x<380) player.x+=15;
});

function spawn(){
  obstacles.push({x:Math.random()*380,y:0,size:20});
}

function updateDodge(){
  if(!running) return;

  if(Math.random()<0.05) spawn();

  for(let o of obstacles){
    o.y+=4;

    if(
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ){
      running=false;
      document.getElementById("dodgeScore").innerText =
        "Game Over! Score: " + score;
      return;
    }
  }

  obstacles = obstacles.filter(o=>o.y<500);
  score++;
  document.getElementById("dodgeScore").innerText = "Score: "+score;
}

function drawDodge(){
  ctx.clearRect(0,0,400,500);

  ctx.fillStyle="#6cf";
  ctx.fillRect(player.x,player.y,20,20);

  ctx.fillStyle="red";
  obstacles.forEach(o=>ctx.fillRect(o.x,o.y,20,20));
}

/* =======================
   🎮 TAP GAME
======================= */

let tapScore=0;
let tapRunning=false;
let time=10;

function startTap(){
  tapScore=0;
  time=10;
  tapRunning=true;
  document.getElementById("tapScore").innerText="Time: 10 | Score: 0";

  let timer=setInterval(()=>{
    time--;
    document.getElementById("tapScore").innerText="Time: "+time+" | Score: "+tapScore;

    if(time<=0){
      clearInterval(timer);
      tapRunning=false;
      document.getElementById("tapScore").innerText="Game Over! Score: "+tapScore;
    }
  },1000);
}

function tap(){
  if(tapRunning){
    tapScore++;
  }
}

/* =======================
   🔁 MAIN LOOP
======================= */

function loop(){
  updateDodge();
  drawDodge();
  requestAnimationFrame(loop);
}

resetDodge();
loop();

</script>

</body>
</html>
