<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<!-- 🔤 FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<!-- 🖼️ FAVICON -->
<link rel="icon" type="image/png" href="logo.png">

<!-- 🔥 SHARE PREVIEW -->
<meta property="og:title" content="AstraVerse Pro">
<meta property="og:description" content="Play futuristic web games">
<meta property="og:image" content="logo.png">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0f;
  color:white;
  text-align:center;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
}

.logo{
  font-family:'Orbitron',sans-serif;
  font-size:1.6rem;
  color:#6cf;
  text-shadow:0 0 10px #6cf,0 0 20px #6cf;
}

/* HEADINGS */
h1,h2,h3{
  font-family:'Rajdhani',sans-serif;
}

/* BUTTON */
.btn{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#6cf,#a855f7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
}

/* CANVAS */
canvas{
  background:#000;
  border:1px solid #6cf;
  border-radius:10px;
  margin-top:20px;
  box-shadow:0 0 20px #6cf;
}

/* GAME SECTIONS */
.game{display:none}
.active{display:block}

</style>
</head>

<body>

<nav>
<div class="logo">⚡ AstraVerse Pro</div>
</nav>

<h1>AstraVerse Pro</h1>

<button class="btn" onclick="showGame('dodge')">Play Neon Dodge</button>

<!-- GAME -->
<div id="dodge" class="game active">
<h2>Neon Dodge</h2>
<canvas id="gameCanvas" width="400" height="500"></canvas>
<p id="score"></p>
<button class="btn" onclick="startGame()">Start Game</button>
</div>

<script>

// SWITCH GAME
function showGame(id){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =====================
   🎮 NEON DODGE GAME
===================== */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player, obstacles, running, score;

// RESET
function resetGame(){
  player = {x:180,y:450,size:20};
  obstacles = [];
  score = 0;
}

// START
function startGame(){
  resetGame();
  running = true;
  document.getElementById("score").innerText="Game Started!";
}

// CONTROLS
document.addEventListener('keydown', e=>{
  if(!running) return;

  if(e.key==="ArrowLeft" && player.x>0) player.x-=15;
  if(e.key==="ArrowRight" && player.x<380) player.x+=15;
});

// SPAWN
function spawn(){
  obstacles.push({x:Math.random()*380,y:0,size:20});
}

// UPDATE
function update(){
  if(!running) return;

  if(Math.random()<0.05) spawn();

  for(let o of obstacles){
    o.y += 4;

    if(
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ){
      running = false;
      document.getElementById("score").innerText =
        "💀 Game Over! Score: " + score;
      return;
    }
  }

  obstacles = obstacles.filter(o=>o.y < 500);
  score++;
  document.getElementById("score").innerText = "Score: " + score;
}

// DRAW
function draw(){
  ctx.clearRect(0,0,400,500);

  // player
  ctx.fillStyle="#6cf";
  ctx.fillRect(player.x,player.y,20,20);

  // obstacles
  ctx.fillStyle="red";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x,o.y,20,20);
  });
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();

</script>

</body>
</html>
