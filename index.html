<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  text-align:center;
}

.logo{
  font-family:'Orbitron';
  color:#00f7ff;
  font-size:2rem;
  margin:20px;
  text-shadow:0 0 15px #00f7ff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00f7ff;
}

.btn{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f7ff,#a855f7);
  color:white;
  cursor:pointer;
}

.game{display:none}
.active{display:block}

canvas{
  background:#000;
  border:2px solid #00f7ff;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="logo">⚡ AstraVerse Pro</div>

<!-- USERNAME -->
<div>
<input id="username" placeholder="Enter your name">
<button class="btn" onclick="saveUser()">Save</button>
<p id="welcome"></p>
</div>

<h2>Choose Game</h2>

<div class="grid">
<div class="card"><button class="btn" onclick="showGame('clickGame')">🎯 Click Game</button></div>
<div class="card"><button class="btn" onclick="showGame('memoryGame')">🧠 Memory</button></div>
<div class="card"><button class="btn" onclick="showGame('brickGame')">🧱 Brick</button></div>
<div class="card"><button class="btn" onclick="showGame('reactionGame')">⚡ Reaction</button></div>
</div>

<!-- CLICK GAME -->
<div id="clickGame" class="game">
<h2>Click Game</h2>
<p id="clickScore">Score: 0</p>
<p id="clickBoard"></p>
<button class="btn" onclick="startClick()">Start</button>
<button id="target" onclick="hitTarget()" style="display:none">🎯</button>
</div>

<!-- MEMORY -->
<div id="memoryGame" class="game">
<h2>Memory Game</h2>
<p id="memoryBoardScore"></p>
<button class="btn" onclick="startMemory()">Start</button>
<div id="memoryBoard"></div>
</div>

<!-- BRICK -->
<div id="brickGame" class="game">
<h2>Brick Breaker</h2>
<canvas id="brickCanvas" width="400" height="400"></canvas>
<p id="brickBoard"></p>
<button class="btn" onclick="startBrick()">Start</button>
</div>

<!-- REACTION -->
<div id="reactionGame" class="game">
<h2>Reaction Game</h2>
<p id="reactionText">Click Start</p>
<p id="reactionBoard"></p>
<button class="btn" onclick="startReaction()">Start</button>
</div>

<script>

/* USER */
function saveUser(){
  let name=document.getElementById("username").value;
  localStorage.setItem("user",name);
  document.getElementById("welcome").innerText="Welcome "+name;
}

function getUser(){
  return localStorage.getItem("user")||"Player";
}

/* SWITCH */
function showGame(id){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LEADERBOARD */
function saveScore(game,score){
  let user=getUser();
  let data=JSON.parse(localStorage.getItem(game))||[];
  data.push({user,score});
  data.sort((a,b)=>b.score-a.score);
  data=data.slice(0,5);
  localStorage.setItem(game,JSON.stringify(data));
}

function showBoard(game,element){
  let data=JSON.parse(localStorage.getItem(game))||[];
  document.getElementById(element).innerText =
    data.map(d=>d.user+": "+d.score).join(" | ");
}

/* CLICK GAME */
let clickScore=0, running=false;

function startClick(){
  clickScore=0;
  running=true;
  document.getElementById("target").style.display="inline";
  move();
  showBoard("click","clickBoard");
}

function move(){
  if(!running) return;
  let t=document.getElementById("target");
  t.style.position="absolute";
  t.style.left=Math.random()*80+"%";
  t.style.top=Math.random()*80+"%";
  setTimeout(move,800);
}

function hitTarget(){
  if(running){
    clickScore++;
    document.getElementById("clickScore").innerText="Score: "+clickScore;

    if(clickScore>=10){
      running=false;
      saveScore("click",clickScore);
      showBoard("click","clickBoard");
      alert("Game Over");
    }
  }
}

/* MEMORY */
let flipped=[],moves=0;

function startMemory(){
  moves=0;
  const emojis=["🔥","🔥","⚡","⚡","🎮","🎮","💎","💎"];
  let cards=emojis.sort(()=>0.5-Math.random());
  let board=document.getElementById("memoryBoard");
  board.innerHTML="";
  flipped=[];

  cards.forEach(e=>{
    let b=document.createElement("button");
    b.innerText="?";
    b.onclick=()=>flip(b,e);
    board.appendChild(b);
  });

  showBoard("memory","memoryBoardScore");
}

function flip(btn,e){
  if(flipped.length<2){
    btn.innerText=e;
    flipped.push({btn,e});
    moves++;

    if(flipped.length===2){
      if(flipped[0].e!==flipped[1].e){
        setTimeout(()=>{
          flipped[0].btn.innerText="?";
          flipped[1].btn.innerText="?";
          flipped=[];
        },800);
      }else flipped=[];
    }

    if(moves>=12){
      saveScore("memory",moves);
      showBoard("memory","memoryBoardScore");
      alert("Game Over Moves:"+moves);
    }
  }
}

/* BRICK */
let paddle,ball,bricks,runB,scoreB;

function startBrick(){
  paddle={x:160,width:80};
  ball={x:200,y:200,dx:3,dy:-3};
  bricks=[];
  scoreB=0;
  runB=true;

  for(let i=0;i<5;i++){
    for(let j=0;j<3;j++){
      bricks.push({x:i*80+10,y:j*30+10});
    }
  }

  showBoard("brick","brickBoard");
}

document.addEventListener("mousemove",e=>{
  if(runB) paddle.x=e.clientX-50;
});

function update(){
  if(!runB) return;

  ball.x+=ball.dx;
  ball.y+=ball.dy;

  if(ball.x<0||ball.x>400) ball.dx*=-1;
  if(ball.y<0) ball.dy*=-1;

  if(ball.y>380 && ball.x>paddle.x && ball.x<paddle.x+paddle.width){
    ball.dy*=-1;
  }

  bricks.forEach((b,i)=>{
    if(ball.x>b.x && ball.x<b.x+60 && ball.y>b.y && ball.y<b.y+20){
      bricks.splice(i,1);
      ball.dy*=-1;
      scoreB++;
    }
  });

  if(ball.y>400){
    runB=false;
    saveScore("brick",scoreB);
    showBoard("brick","brickBoard");
    alert("Game Over");
  }
}

function draw(){
  let ctx=document.getElementById("brickCanvas").getContext("2d");
  ctx.clearRect(0,0,400,400);
  ctx.fillRect(paddle.x,380,paddle.width,10);
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
  bricks.forEach(b=>ctx.fillRect(b.x,b.y,60,20));
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* REACTION */
let startT;

function startReaction(){
  document.getElementById("reactionText").innerText="Wait...";

  setTimeout(()=>{
    document.body.style.background="green";
    startT=Date.now();

    document.body.onclick=()=>{
      let t=Date.now()-startT;
      document.body.style.background="#020617";
      saveScore("reaction",-t); // lower better
      showBoard("reaction","reactionBoard");
      alert("Time:"+t+"ms");
      document.body.onclick=null;
    };

  },Math.random()*3000+2000);
}

</script>

</body>
</html>
