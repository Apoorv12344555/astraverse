<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AstraVerse Pro</title>

<!-- GOOGLE ADS AUTO -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR-ADSENSE-ID"
crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:white;
  text-align:center;
}

.logo{
  font-family:Orbitron;
  color:#00f7ff;
  font-size:2rem;
  margin:20px;
}

nav{
  background:#000;
  padding:10px;
}
nav button{
  margin:5px;
  padding:10px;
  background:#00f7ff;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.section{display:none}
.active{display:block}

.card{
  background:#111;
  padding:20px;
  margin:10px;
  border-radius:20px;
}

.btn{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#00f7ff,#a855f7);
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="logo"> AstraVerse Pro</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('about')">About</button>
<button onclick="show('contact')">Contact</button>
<button onclick="show('privacy')">Privacy</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">

<h3>Enter Username</h3>
<input id="userInput">
<button class="btn" onclick="saveUser()">Save</button>
<p id="welcome"></p>

<h2>Games</h2>

<div class="card">
<button class="btn" onclick="openGame('tic')">Tic Tac Toe</button>
<button class="btn" onclick="openGame('guess')">Guess Number</button>
</div>

<div id="tic" class="card" style="display:none">
<h3>Tic Tac Toe</h3>
<div id="board"></div>
<button class="btn" onclick="startTic()">Start</button>
</div>

<div id="guess" class="card" style="display:none">
<h3>Guess Game</h3>
<input id="guessInput">
<button class="btn" onclick="guess()">Try</button>
<p id="result"></p>
</div>

<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>

</div>

<!-- ABOUT -->
<div id="about" class="section">
<h2>About</h2>
<p>AstraVerse Pro is a gaming platform built by Apoorv.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact</h2>
<p>Email: your@email.com</p>
</div>

<!-- PRIVACY -->
<div id="privacy" class="section">
<h2>Privacy Policy</h2>
<p>We use cookies and ads for better experience.</p>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

<script>

/* NAVIGATION */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* USER */
function saveUser(){
  let name=document.getElementById("userInput").value;
  localStorage.setItem("user",name);
  document.getElementById("welcome").innerText="Welcome "+name;
}

/* SOUND */
function playSound(){
  document.getElementById("clickSound").play();
}

/* GAME OPEN */
function openGame(id){
  playSound();
  document.getElementById("tic").style.display="none";
  document.getElementById("guess").style.display="none";
  document.getElementById(id).style.display="block";
}

/* LEADERBOARD */
function updateScore(points){
  let name=localStorage.getItem("user") || "Guest";
  let data=JSON.parse(localStorage.getItem("scores")||"[]");
  data.push({name,points});
  localStorage.setItem("scores",JSON.stringify(data));
  showLeaderboard();
}

function showLeaderboard(){
  let data=JSON.parse(localStorage.getItem("scores")||"[]");
  data.sort((a,b)=>b.points-a.points);

  let html="";
  data.slice(0,5).forEach(d=>{
    html+=`<li>${d.name} - ${d.points}</li>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

showLeaderboard();

/* TIC TAC TOE */
let turn="X";
let boardState=[];

function startTic(){
  let board=document.getElementById("board");
  board.innerHTML="";
  boardState=["","","","","","","","",""];
  turn="X";

  for(let i=0;i<9;i++){
    let b=document.createElement("button");
    b.className="btn";
    b.onclick=()=>move(b,i);
    board.appendChild(b);
  }
}

function move(btn,i){
  if(boardState[i]==""){
    playSound();
    boardState[i]=turn;
    btn.innerText=turn;

    if(checkWin()){
      alert(turn+" wins!");
      updateScore(10);
      return;
    }

    turn=turn=="X"?"O":"X";
  }
}

function checkWin(){
  let w=[[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];
  return w.some(a=>boardState[a[0]] && boardState[a[0]]==boardState[a[1]] && boardState[a[1]]==boardState[a[2]]);
}

/* GUESS */
let num=Math.floor(Math.random()*10);

function guess(){
  let g=document.getElementById("guessInput").value;

  if(g==num){
    document.getElementById("result").innerText="Correct!";
    updateScore(5);
    num=Math.floor(Math.random()*10);
  } else {
    document.getElementById("result").innerText="Wrong!";
  }
}

</script>

</body>
</html>
