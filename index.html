<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraVerse Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron',sans-serif;background:#0a0a0f;color:white}

/* NAVBAR */
nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;background:#0a0a0f;border-bottom:1px solid #1f1f2e}
.logo{font-size:1.5rem;color:#6cf}
nav a{color:#aaa;margin-left:20px;text-decoration:none}
nav a:hover{color:#6cf}

/* HERO */
.hero{padding:100px 20px;text-align:center}
.hero h1{font-size:3rem;background:linear-gradient(90deg,#6cf,#a855f7);-webkit-background-clip:text;color:transparent}
.hero p{color:#aaa}

.btn{margin-top:20px;padding:12px 28px;border-radius:30px;border:none;background:linear-gradient(90deg,#6cf,#a855f7);color:white;cursor:pointer}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.card{background:#111;border-radius:15px;padding:20px}

/* GAME */
#gameCanvas{display:block;margin:20px auto;background:#000;border:1px solid #6cf;border-radius:10px}

footer{text-align:center;padding:30px;color:#666}
</style>
</head>

<body>

<nav>
<div class="logo">⚡ AstraVerse Pro</div>
<div>
<a href="#">Home</a>
<a href="#games">Games</a>
<a href="#features">Features</a>
</div>
</nav>

<section class="hero">
<h1>AstraVerse Pro</h1>
<p>Where Focus Meets Power</p>
<button class="btn" onclick="scrollToGames()">Explore Games</button>
</section>

<section id="games" class="grid">
<div class="card">
<h3>Dodge Game</h3>
<button class="btn" onclick="startGame()">Play</button>
</div>
</section>

<canvas id="gameCanvas" width="400" height="500"></canvas>
<p id="score" style="text-align:center"></p>

<footer>
© 2026 AstraVerse Pro
</footer>

<script>

// Scroll
function scrollToGames(){
  document.getElementById('games').scrollIntoView({behavior:'smooth'})
}

// Setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = {x:180, y:450, size:20};
let obstacles = [];
let running = false;
let score = 0;

// Start Game
function startGame(){
  running = true;
  score = 0;
  obstacles = [];
  player.x = 180;
  loop();
}

// Controls
document.addEventListener('keydown', e=>{
  if(e.key==="ArrowLeft" && player.x > 0) player.x -= 15;
  if(e.key==="ArrowRight" && player.x < 380) player.x += 15;
});

// Spawn obstacles
function spawn(){
  obstacles.push({x:Math.random()*380, y:0, size:20});
}

// Update game
function update(){
  if(!running) return;

  if(Math.random()<0.05) spawn();

  obstacles.forEach(o=>{
    o.y += 4;

    // Collision
    if(
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ){
      running = false;

      setTimeout(()=>{
        alert("Game Over! Score: " + score);
      },100);
    }
  });

  obstacles = obstacles.filter(o=>o.y < 500);

  score++;
  document.getElementById('score').innerText = "Score: " + score;
}

// Draw
function draw(){
  ctx.clearRect(0,0,400,500);

  // Player
  ctx.fillStyle = "#6cf";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x, o.y, o.size, o.size);
  });
}

// Game loop
function loop(){
  if(!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

</script>

</body>
</html>
